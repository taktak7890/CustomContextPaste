name: Build and Package Extension

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 24
        cache: 'npm'

    - name: Install dependencies
      run: npm install

    - name: Build extension
      run: npm run build

    - name: Get version from package.json
      id: package-version
      run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

    - name: Create Zip archive
      run: |
        cd dist
        zip -r ../custom-context-paste-v${{ steps.package-version.outputs.version }}.zip .

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: extension-zip
        path: custom-context-paste-v${{ steps.package-version.outputs.version }}.zip
